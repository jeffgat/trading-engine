name: Deploy Main DB API

on:
  push:
    branches: [main]
    paths:
      - 'backtesting/src/**'
      - 'backtesting/deploy/deploy_db.sh'
      - 'backtesting/deploy/experiments_api.py'
      - 'backtesting/deploy/main-db.service'
      - '.github/workflows/deploy-db.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DROPLET_SSH_KEY }}
          known_hosts: ${{ secrets.DROPLET_KNOWN_HOSTS }}

      - name: Deploy Main DB API
        run: |
          bash backtesting/deploy/deploy_db.sh
